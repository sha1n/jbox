name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
      - 'bug'
  - title: '🛠 Maintenance'
    labels:
      - 'chore'
      - 'refactor'
  - title: '📦 Build & CI'
    labels:
      - 'ci'
      - 'build'
  - title: '📚 Documentation'
    labels:
      - 'docs'
  - title: '🧪 Tests'
    labels:
      - 'test'

change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - 'major'
      - 'breaking'
  minor:
    labels:
      - 'minor'
      - 'feature'
      - 'enhancement'
  patch:
    labels:
      - 'patch'
      - 'fix'
      - 'bug'
      - 'chore'
      - 'docs'
      - 'ci'
      - 'build'
      - 'test'
      - 'refactor'
  default: patch

exclude-labels:
  - 'skip-changelog'
  - 'no-changelog'

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
