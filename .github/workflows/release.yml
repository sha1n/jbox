name: Release

# Fires when a release is published via the GitHub UI. GitHub does NOT
# emit `release` events for drafts, so `published` is the only viable
# trigger — drafts can't be pre-built. The release author writes the
# notes in the UI; this workflow builds the DMG and attaches it as an
# asset. Because the UI creates the tag on the target branch (master),
# tag-on-master is mechanically enforced — the orphan-tag failure mode
# from the v0.1.0-alpha cut cannot recur.

on:
  release:
    types: [published]

permissions:
  contents: write   # needed to upload the DMG as a release asset

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build-dmg:
    name: Build DMG & upload asset
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout at release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Derive version
        id: version
        run: |
          # Strip leading 'v' from the tag (v0.0.1-alpha -> 0.0.1-alpha).
          tag="${{ github.event.release.tag_name }}"
          version="${tag#v}"
          echo "tag=${tag}"         >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Tag:     ${tag}"
          echo "Version: ${version}"

      - name: Show toolchain versions
        run: |
          swift --version
          clang --version
          sw_vers

      - name: Build release
        env:
          JBOX_VERSION: ${{ steps.version.outputs.version }}
        run: ./scripts/build_release.sh

      - name: Package DMG
        env:
          JBOX_VERSION: ${{ steps.version.outputs.version }}
        run: ./scripts/package_unsigned_release.sh

      - name: Verify DMG exists
        run: |
          ls -lh build/Jbox-${{ steps.version.outputs.version }}.dmg

      - name: Upload DMG to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # --clobber lets re-runs (e.g. failed first attempt, manual rerun
          # from the Actions tab) overwrite a partial upload of the same name.
          gh release upload "${{ steps.version.outputs.tag }}" \
            "build/Jbox-${{ steps.version.outputs.version }}.dmg" \
            --clobber

      - name: Append install instructions to release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          ISSUES_URL: ${{ github.server_url }}/${{ github.repository }}/issues
        run: |
          set -euo pipefail

          # Marker line lets us strip a prior auto-appended footer on re-runs
          # so the workflow is idempotent and the footer never stacks.
          MARKER='<!-- jbox-install-footer -->'

          curated=$(gh release view "$TAG" --json body --jq '.body // ""')
          curated_clean=$(printf '%s' "$curated" | awk -v m="$MARKER" '$0 == m {exit} {print}')

          footer=$(sed -e "s|\${VERSION}|${VERSION}|g" \
                       -e "s|\${ISSUES_URL}|${ISSUES_URL}|g" \
                       .github/release-install-footer.md.tpl)

          printf '%s\n%s\n' "$curated_clean" "$footer" \
            | gh release edit "$TAG" --notes-file -
