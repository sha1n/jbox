name: Release Drafter

# Maintains a rolling draft GitHub release that aggregates merged PRs
# into the next version's release notes. Triggered only on master so the
# draft reflects integrated work, not in-flight PRs.

on:
  push:
    branches:
      - master

permissions:
  contents: write       # write/update the draft release
  pull-requests: read   # read merged PRs to summarise

concurrency:
  group: release-drafter-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-draft:
    name: Update release draft
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Update draft release
        uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-name: release-drafter.yml
