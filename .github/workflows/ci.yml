name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (macOS)
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain versions
        run: |
          swift --version
          clang --version
          sw_vers

      - name: RT-safety scan
        run: ./scripts/rt_safety_scan.sh

      - name: Build (release)
        run: swift build -c release

      - name: Test (debug)
        run: swift test
